server {
    listen 8000;
    server_name localhost;
    root /home/farzadoxo/Desktop/poor-spotify/src/static;
    index index.html;
    client_max_body_size 50M;

    location ^~ /api/music/ {
        proxy_pass http://127.0.0.1:6969;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/csrf/{
        proxy_pass http://127.0.0.1:6969;

    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /media/{
        alias /home/farzadoxo/Desktop/poor_spotify/src/media/covers/;
        expires 30d;
        add_header Cache_Control "public, max-age=2592000";
        access_log off;
    }
}
