server{
    listen 8000;
    server_name localhost;
    root src/;
    index index.html index.htm;

    location static/{
        alias src/static/;
        expire 30d;

    }

    location media/{
        alias src/media/;
        expire 30d;
    }


    location /{
        proxy_pass http://127.0.0.1:6969;
    }

}