

# env_file: 
#     - src/.env


services:

    db:
        image: mysql:latest
        container_name: mysql_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASS}
        
        volumes:
            - db_data:/var/lib/mysql


    api:
        build: .
        container_name: api
        restart: always

        depends_on: 
            - db
        volumes:
            - ./src:/src
        expose:
            - "6969"

    nginx:
        image: nginx:latest
        container_name: webserver
        restart: always
        ports:
            - "80:80"
        depends_on: 
            - api
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./src/front-end:/usr/share/nginx/html:ro

volumes:
  db_data:
